<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>yuchishopping代購</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2B6CB0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="https://img.icons8.com/flat-round/512/shopping-bag.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color:#F7FAFC; color:#2D3748; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 基礎輔助工具
    const mkId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const fmtDate = s => s ? new Date(s).toLocaleDateString("zh-TW", { month: "short", day: "numeric" }) : "";

    // 狀態定義與全新柔和藍白、幾何風格配色
    const ITEM_STATUS = {
      pending: { label: "待訂購", color: "#4A5568", bg: "#EDF2F7" },
      ordered: { label: "已訂購", color: "#2B6CB0", bg: "#EBF8FF" },
      packed: { label: "已打包", color: "#B7791F", bg: "#FEFCBF" },
      shipped_from: { label: "已從集運寄出", color: "#553C9A", bg: "#EBF4FF" },
      in_transit: { label: "等待配送", color: "#2C5282", bg: "#BEE3F8" },
      arrived: { label: "已到貨", color: "#22543D", bg: "#C6F6D5" },
      sent_to_client: { label: "已出貨給客人", color: "#2B6CB0", bg: "#EBF8FF" }
    };

    const SHIP_STAGES = [
      { id: "packed", label: "已打包", emoji: "📦" },
      { id: "shipped_from", label: "已從集運", emoji: "✈️" },
      { id: "in_transit", label: "等待配送", emoji: "🚚" },
      { id: "arrived", label: "已到貨", emoji: "✅" }
    ];

    const PO_STAGES = [
      { id: "ordered", label: "已下單", emoji: "🛒", color: "#2B6CB0", bg: "#EBF8FF" },
      { id: "paid", label: "已付款", emoji: "💳", color: "#553C9A", bg: "#EBF4FF" },
      { id: "arrived", label: "已到貨", emoji: "🏢", color: "#22543D", bg: "#C6F6D5" },
      { id: "done", label: "完成", emoji: "🎉", color: "#4A5568", bg: "#EDF2F7" }
    ];

    const getPOStage = id => PO_STAGES.find(s => s.id === id) || PO_STAGES[0];
    const getShipStage = id => SHIP_STAGES.find(s => s.id === id) || SHIP_STAGES[0];
    const getItemStatus = id => ITEM_STATUS[id] || ITEM_STATUS.pending;

    function App() {
      // 完整承接您原版 PDF 的所有核心 State
      const [chars, setChars] = useState([]);
      const [series, setSeries] = useState([]);
      const [products, setProducts] = useState([]);
      const [cos, setCos] = useState([]);
      const [pos, setPos] = useState([]);
      const [ships, setShips] = useState([]);
      const [pkgs, setPkgs] = useState([]);
      
      const [view, setView] = useState("dashboard");
      const [loading, setLoading] = useState(true);

      // 手機專用簡易表單彈窗狀態
      const [coModal, setCoModal] = useState(false);
      const [newCoName, setNewCoName] = useState("");
      const [newCoNote, setNewCoNote] = useState("");

      // 本機儲存機制（確保關閉 App 後資料不遺失）
      useEffect(() => {
        const entries = [
          ["of_chars", setChars], ["of_series", setSeries], ["of_products", setProducts],
          ["of_cos", setCos], ["of_pos", setPos], ["of_ships", setShips], ["of_pkgs", setPkgs]
        ];
        entries.forEach(([k, fn]) => {
          const r = localStorage.getItem(k);
          if (r) fn(JSON.parse(r));
        });
        setLoading(false);
      }, []);

      const persist = (k, d) => localStorage.setItem(k, JSON.stringify(d));

      // 資料變更與同步儲存機制
      const saveCos = d => { setCos(d); persist("of_cos", d); };
      const savePos = d => { setPos(d); persist("of_pos", d); };
      const saveShips = d => { setShips(d); persist("of_ships", d); };
      const savePkgs = d => { setPkgs(d); persist("of_pkgs", d); };

      // 財務計算邏輯 (源自原版 PDF)
      const totalRevenue = useMemo(() => cos.reduce((s, c) => s + (c.items || []).reduce((ss, i) => ss + (parseFloat(i.price) * parseInt(i.qty || 1 || 0)), 0), 0), [cos]);
      const totalPoCost = useMemo(() => pos.reduce((s, p) => s + (parseFloat(p.cardAmount) || 0), 0), [pos]);
      const totalShipCost = useMemo(() => ships.reduce((s, sh) => s + (parseFloat(sh.shippingCost) || 0), 0), [ships]);
      const totalPkgCost = useMemo(() => pkgs.reduce((s, pk) => s + (parseFloat(pk.amount) || 0), 0), [pkgs]);
      const totalCost = totalPoCost + totalShipCost + totalPkgCost;
      const totalProfit = totalRevenue - totalCost;

      // 新增客戶訂單方法
      const handleAddCo = () => {
        if(!newCoName.trim()) return alert("請輸入客戶姓名");
        const newOrder = {
          id: mkId(),
          clientName: newCoName,
          note: newCoNote,
          date: new Date().toISOString(),
          items: []
        };
        saveCos([newOrder, ...cos]);
        setNewCoName("");
        setNewCoNote("");
        setCoModal(false);
      };

      if (loading) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F7FAFC", color: "#2B6CB0", fontSize: "16px", fontWeight: "600" }}>系統載入中...</div>;

      const NAV = [
        { id: "dashboard", label: "財務總覽", icon: "📊" },
        { id: "customer", label: "客戶訂單", icon: "👥" },
        { id: "purchase", label: "採購清單", icon: "🛒" },
        { id: "shipment", label: "集運物流", icon: "🚚" }
      ];

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh", backgroundColor: "#F7FAFC" }}>
          
          {/* 頂部導航列：簡約現代感 */}
          <header style={{ background: "white", borderBottom: "1px solid #E2E8F0", padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.02)" }}>
            <div>
              <h1 style={{ fontSize: "20px", fontWeight: "800", color: "#2B6CB0", margin: 0, letterSpacing: "0.3px" }}>yuchishopping代購</h1>
              <p style={{ fontSize: "11px", color: "#A0AEC0", margin: "2px 0 0 0", fontWeight: "500" }}>核心數據管理工作台</p>
            </div>
            <button onClick={() => setCoModal(true)} style={{ background: "#2B6CB0", color: "white", padding: "8px 16px", borderRadius: "24px", fontSize: "12px", fontWeight: "700", border: "none", boxShadow: "0 2px 4px rgba(43,108,176,0.2)" }}>
              ＋ 新增訂單
            </button>
          </header>

          {/* 主內容呈現區 */}
          <main style={{ flex: 1, overflow: "auto", padding: "16px" }}>
            
            {/* 1. 數據總覽面板 */}
            {view === "dashboard" && (
              <div>
                <div style={{ background: "linear-gradient(135deg, #3182CE 0%, #2B6CB0 100%)", padding: "24px", borderRadius: "18px", color: "white", marginBottom: "16px", boxShadow: "0 6px 12px rgba(49,130,206,0.15)" }}>
                  <div style={{ fontSize: "12px", opacity: 0.85, fontWeight: "600", letterSpacing: "0.5px" }}>預估營業額 (REVENUE)</div>
                  <div style={{ fontSize: "32px", fontWeight: "800", marginTop: "4px" }}>${totalRevenue.toLocaleString()}</div>
                </div>
                
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "20px" }}>
                  <div style={{ background: "white", padding: "16px", borderRadius: "16px", border: "1px solid #E2E8F0" }}>
                    <div style={{ fontSize: "12px", color: "#718096", fontWeight: "500" }}>總支出成本</div>
                    <div style={{ fontSize: "20px", fontWeight: "700", color: "#E53E3E", marginTop: "4px" }}>${totalCost.toLocaleString()}</div>
                  </div>
                  <div style={{ background: "white", padding: "16px", borderRadius: "16px", border: "1px solid #E2E8F0" }}>
                    <div style={{ fontSize: "12px", color: "#718096", fontWeight: "500" }}>預估淨利潤</div>
                    <div style={{ fontSize: "20px", fontWeight: "700", color: "#38A169", marginTop: "4px" }}>${totalProfit.toLocaleString()}</div>
                  </div>
                </div>

                <div style={{ background: "white", padding: "20px", borderRadius: "16px", border: "1px solid #E2E8F0" }}>
                  <h3 style={{ fontSize: "14px", fontWeight: "700", color: "#2D3748", margin: "0 0 10px 0" }}>⚡️ 系統即時摘要</h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: "8px", fontSize: "13px", color: "#4A5568" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #EDF2F7", paddingBottom:"6px" }}><span>目前客戶總數:</span> <strong>{cos.length} 位</strong></div>
                    <div style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #EDF2F7", paddingBottom:"6px" }}><span>採購單(PO)數量:</span> <strong>{pos.length} 筆</strong></div>
                    <div style={{ display:"flex", justifyContent:"space-between" }}><span>國際集運單數:</span> <strong>{ships.length} 批</strong></div>
                  </div>
                </div>
              </div>
            )}

            {/* 2. 客戶訂單管理面板 */}
            {view === "customer" && (
              <div>
                <h2 style={{ fontSize: "16px", fontWeight: "700", marginBottom: "12px", color: "#2B6CB0" }}>👥 客戶訂單列表 ({cos.length})</h2>
                {cos.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 0", color: "#A0AEC0", fontSize: "14px" }}>目前尚無訂單，請點擊右上角新增。</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                    {cos.map(c => (
                      <div key={c.id} style={{ background: "white", padding: "16px", borderRadius: "14px", border: "1px solid #E2E8F0", boxShadow: "0 2px 4px rgba(0,0,0,0.01)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                          <span style={{ fontWeight: "700", fontSize: "15px", color: "#2D3748" }}>{c.clientName}</span>
                          <span style={{ fontSize: "11px", color: "#A0AEC0" }}>{fmtDate(c.date)}</span>
                        </div>
                        {c.note && <p style={{ fontSize: "12px", color: "#718096", margin: "0 0 8px 0", background: "#F7FAFC", padding: "6px 10px", borderRadius: "6px" }}>備註: {c.note}</p>}
                        <div style={{ fontSize: "12px", color: "#4A5568", textAlign: "right" }}>
                          商品品項: {c.items?.length || 0} 件
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* 3. 採購單管理面板 */}
            {view === "purchase" && (
              <div>
                <h2 style={{ fontSize: "16px", fontWeight: "700", marginBottom: "12px", color: "#2B6CB0" }}>🛒 國外採購單(PO)管理</h2>
                <div style={{ background: "white", padding: "16px", borderRadius: "14px", border: "1px solid #E2E8F0", marginBottom: "12px" }}>
                  <button onClick={() => savePos([{id: mkId(), poNo: "PO-"+Date.now().toString().slice(-4), cardAmount: 0, stage: "ordered"}, ...pos])} style={{ width: "100%", background: "#EBF8FF", color: "#2B6CB0", padding: "10px", borderRadius: "10px", fontSize: "13px", fontWeight: "700", border: "1px dashed #2B6CB0" }}>
                    ＋ 新增一筆國外採購記錄
                  </button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {pos.map(p => (
                    <div key={p.id} style={{ background: "white", padding: "14px", borderRadius: "12px", border: "1px solid #E2E8F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <span style={{ fontWeight: "700", fontSize: "14px" }}>{p.poNo}</span>
                        <div style={{ fontSize: "11px", color: "#A0AEC0", marginTop: "2px" }}>進度: {getPOStage(p.stage).emoji} {getPOStage(p.stage).label}</div>
                      </div>
                      <input type="number" placeholder="扣卡金額" value={p.cardAmount || ""} onChange={e => {
                        const val = e.target.value;
                        savePos(pos.map(x => x.id === p.id ? { ...x, cardAmount: val } : x));
                      }} style={{ width: "100px", padding: "6px", fontSize: "13px", textAlign: "right", marginTop: 0 }} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 4. 物流與集運面板 */}
            {view === "shipment" && (
              <div>
                <h2 style={{ fontSize: "16px", fontWeight: "700", marginBottom: "12px", color: "#2B6CB0" }}>🚚 國際集運與物流追蹤</h2>
                <div style={{ background: "white", padding: "16px", borderRadius: "14px", border: "1px solid #E2E8F0", marginBottom: "12px" }}>
                  <button onClick={() => saveShips([{id: mkId(), shipNo: "SHIP-"+Date.now().toString().slice(-4), shippingCost: 0, stage: "packed"}, ...ships])} style={{ width: "100%", background: "#EBF8FF", color: "#2B6CB0", padding: "10px", borderRadius: "10px", fontSize: "13px", fontWeight: "700", border: "1px dashed #2B6CB0" }}>
                    ＋ 建立新國際集運批次
                  </button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {ships.map(s => (
                    <div key={s.id} style={{ background: "white", padding: "14px", borderRadius: "12px", border: "1px solid #E2E8F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <span style={{ fontWeight: "700", fontSize: "14px" }}>{s.shipNo}</span>
                        <div style={{ fontSize: "11px", color: "#A0AEC0", marginTop: "2px" }}>狀態: {getShipStage(s.stage).emoji} {getShipStage(s.stage).label}</div>
                      </div>
                      <input type="number" placeholder="運費成本" value={s.shippingCost || ""} onChange={e => {
                        const val = e.target.value;
                        saveShips(ships.map(x => x.id === s.id ? { ...x, shippingCost: val } : x));
                      }} style={{ width: "100px", padding: "6px", fontSize: "13px", textAlign: "right", marginTop: 0 }} />
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>

          {/* 手機專用新增訂單彈窗表單 */}
          {coModal && (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", zIndex: 999 }}>
              <div style={{ background: "white", width: "100%", borderRadius: "16px", padding: "20px", boxShadow: "0 10px 25px rgba(0,0,0,0.1)" }}>
                <h3 style={{ margin: "0 0 16px 0", fontSize: "16px", fontWeight: "700", color: "#2B6CB0" }}>＋ 新增客戶訂單</h3>
                <label style={{ fontSize: "12px", fontWeight: "600", color: "#4A5568" }}>客戶姓名 *</label>
                <input type="text" value={newCoName} onChange={e => setNewCoName(e.target.value)} placeholder="例如：陳小姐" style={{ margin: "6px 0 14px 0" }} />
                
                <label style={{ fontSize: "12px", fontWeight: "600", color: "#4A5568" }}>訂單備註 (選填)</label>
                <textarea value={newCoNote} onChange={e => setNewCoNote(e.target.value)} placeholder="例如：要包裝、IG來源" style={{ width: "100%", padding: "8px", border: "1px solid #E2E8F0", borderRadius: "8px", marginTop: "6px", height: "60px", fontSize: "13px" }} />
                
                <div style={{ display: "flex", gap: "10px", marginTop: "18px" }}>
                  <button onClick={() => setCoModal(false)} style={{ flex: 1, padding: "10px", background: "#EDF2F7", color: "#4A5568", borderRadius: "10px", fontWeight: "600", border: "none" }}>取消</button>
                  <button onClick={handleAddCo} style={{ flex: 1, padding: "10px", background: "#2B6CB0", color: "white", borderRadius: "10px", fontWeight: "600", border: "none" }}>儲存</button>
                </div>
              </div>
            </div>
          )}

          {/* 底部行動裝置導航 Tab Bar */}
          <nav style={{ background: "white", borderTop: "1px solid #E2E8F0", display: "flex", height: "65px", paddingBottom: "env(safe-area-inset-bottom)", boxShadow: "0 -2px 10px rgba(0,0,0,0.01)" }}>
            {NAV.map(n => {
              const isAct = view === n.id;
              return (
                <button key={n.id} onClick={() => setView(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "4px", color: isAct ? "#2B6CB0" : "#A0AEC0", border: "none", background: "none", transition: "color 0.2s" }}>
                  <span style={{ fontSize: "20px" }}>{n.icon}</span>
                  <span style={{ fontSize: "11px", fontWeight: isAct ? "700" : "500" }}>{n.label}</span>
                </button>
              );
            })}
          </nav>

        </div>
      );
    }

    // 啟動 React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // 註冊 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
