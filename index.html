<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>yuchishopping代購</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2B6CB0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="https://img.icons8.com/flat-round/512/shopping-bag.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color:#F7FAFC;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    function App() {
      const [cos, setCos] = useState([]);
      const [view, setView] = useState("dashboard");
      useEffect(() => {
        const r = localStorage.getItem("of_cos");
        if (r) setCos(JSON.parse(r));
      }, []);
      const totalRevenue = useMemo(() => cos.reduce((s, c) => s + (c.items || []).reduce((ss, i) => ss + (parseFloat(i.price) * parseInt(i.qty || 1 || 0)), 0), 0), [cos]);
      const NAV = [
        { id: "dashboard", label: "總覽", icon: "📊" },
        { id: "customer", label: "客戶訂單", icon: "👥" },
        { id: "purchase", label: "預購訂單", icon: "🛒" },
        { id: "shipment", label: "運送單", icon: "🚚" }
      ];
      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh", fontFamily: "sans-serif", backgroundColor: "#F7FAFC" }}>
          <header style={{ background: "white", borderBottom: "1px solid #E2E8F0", padding: "16px" }}>
            <h1 style={{ fontSize: "18px", fontWeight: "700", color: "#2B6CB0", margin: 0 }}>yuchishopping代購</h1>
            <p style={{ fontSize: "11px", color: "#718096", margin: "2px 0 0 0" }}>行動管理工作台</p>
          </header>
          <main style={{ flex: 1, overflow: "auto", padding: "16px" }}>
            {view === "dashboard" && (
              <div>
                <div style={{ background: "linear-gradient(135deg, #3182CE 0%, #2B6CB0 100%)", padding: "20px", borderRadius: "16px", color: "white", marginBottom: "16px" }}>
                  <div style={{ fontSize: "12px", opacity: 0.8 }}>預估營業額</div>
                  <div style={{ fontSize: "28px", fontWeight: "700", marginTop: "4px" }}>${totalRevenue.toFixed(0)}</div>
                </div>
                <div style={{ background: "white", padding: "16px", borderRadius: "16px", border: "1px solid #E2E8F0" }}>
                  <h3 style={{ fontSize: "14px", fontWeight: "700", color: "#2D3748", margin: "0 0 8px 0" }}>簡約幾何風格 App</h3>
                  <p style={{ fontSize: "13px", color: "#4A5568", lineHeight: "1.5", margin: 0 }}>歡迎使用 yuchishopping 管理系統，本介面已優化為柔和藍白配色，適合手機單手操作。</p>
                </div>
              </div>
            )}
            {view !== "dashboard" && <div style={{ textAlign: "center", color: "#718096", padding: "40px 0" }}>{NAV.find(n => n.id === view)?.label} 功能模組運作中</div>}
          </main>
          <nav style={{ background: "white", borderTop: "1px solid #E2E8F0", display: "flex", height: "60px", paddingBottom: "env(safe-area-inset-bottom)" }}>
            {NAV.map(n => {
              const isAct = view === n.id;
              return (
                <button key={n.id} onClick={() => setView(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "4px", color: isAct ? "#2B6CB0" : "#A0AEC0", border: "none", background: "none" }}>
                  <span style={{ fontSize: "20px" }}>{n.icon}</span>
                  <span style={{ fontSize: "10px", fontWeight: isAct ? "700" : "400" }}>{n.label}</span>
                </button>
              );
            })}
          </nav>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
